<h1 class="demos-page-title">Gauge</h1>

<p class="demos-page-lead">
  Medidores com <code>SmzGaugeBuilder</code> e componente <code>smz-ui-gauge</code>.
</p>

@for (cached of cachedUseCases; track cached.useCase.id) {

  <section class="demos-demo-section">
    <h2 id="{{ cached.useCase.id }}">{{ cached.useCase.title }}</h2>

    <div class="demos-demo-section__example">
      <smz-ui-gauge [state]="cached.state" />
    </div>

    <h3>Código</h3>

    <app-demo-code-block [code]="cached.useCase.snippet" />
  </section>
}
